<div [formGroup]="consentsFormRecord" class="w-full animate-fade-in" role="form" aria-label="Zgody i oświadczenia">
  
  @for (group of getGroupedConsents(); track group.label) {
    <section style="margin-bottom: 24px;" [attr.aria-labelledby]="'group-label-' + $index">
      <!-- Nagłówek grupy -->
      <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
        <h3 [id]="'group-label-' + $index" style="font-size: 10px; font-weight: 900; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; margin: 0; white-space: nowrap;">
          {{ group.label }}
        </h3>
        
        <div style="height: 1px; background: var(--border-color); width: 100%;" aria-hidden="true"></div>
      </div>

      <div style="display: flex; flex-direction: column;">
        @for (consent of group.items; track consent.id) {
          <!-- KARTA ZGODY -->
          <div class="consent-card" [class.consent-active]="consentsFormRecord.get(consent.id)?.value">
            
            <p-checkbox 
              [formControlName]="consent.id" 
              [binary]="true" 
              [inputId]="consent.id"
              [attr.aria-required]="consent.required"
              [attr.aria-describedby]="consent.description ? 'desc-' + consent.id : null"
              [attr.aria-invalid]="consent.required && !consentsFormRecord.get(consent.id)?.value && consentsFormRecord.get(consent.id)?.touched">
            </p-checkbox>

            <!-- Tekst zgody -->
            <label [for]="consent.id" style="flex: 1; cursor: pointer;">
              <div style="display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 2px;">
                @if (consent.required) {
                  <span style="color: var(--error-text); font-weight: bold; font-size: 14px;" aria-hidden="true">*</span>
                  <span class="sr-only">Zgoda wymagana</span>
                  <span style="font-size: 7px; font-weight: 900; background: var(--error-text); color: white; padding: 1px 4px; border-radius: 3px; text-transform: uppercase;" aria-hidden="true">Wymagana</span>
                }
                
                <span style="font-weight: 700; color: var(--text-main); font-size: 13px;">{{ consent.title }}</span>
              </div>
              @if (consent.description) {
                
                <p [id]="'desc-' + consent.id" style="font-size: 11px; color: var(--text-muted); margin: 0; line-height: 1.3;">
                  {{ consent.description }}
                </p>
              }
            </label>
          </div>
        }
      </div>
    </section>
  }
</div>
